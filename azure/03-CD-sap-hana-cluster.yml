---
# call playbook with # ansible-playbook example_in_one_file.yml
- name: "Phase 03-C and 03-D -Setup HANA System Replication and Cluster on Azure"
  hosts: "{{ group_hana | d('hanas') }}"
  become: true

#  vars:
#    sap_domain: example.com
#
#    sap_hana_sid: 'DB1'
#    sap_hana_instance_number: '00'
#    sap_hana_install_master_password: 'my_hana_password'
#
#
# Prerequisites of this playbook
#
#  az_rg:     Name of Azure Resource Group
#  az_subnet: name of Azure Subnet
#  az_vnet:   name of virtual Network in Subnet

# Access the IP Address of a particular hostname:
# hostvars[inventory_hostname].ansible_host
#

  tasks:
    - name: Configure HANA System Replication
      ansible.builtin.include_role:
        name: community.sap_install.sap_ha_install_hana_hsr

    # Name from Azure Credentials
    - name: Set fence device
      ansible.builtin.set_fact:
        sap_pacemaker_stonith_devices:
          - name: "fence_name_for_azure"
            agent: "fence_azure_arm"
            parameters: >
              "username=lookup  appid"
              "password=lookup secret"
              "subscriptionId=lookup"
              "tenantId=lookup"
              "resourceGroup=lookup"
              "pcmk_host_list=inventroy hostnames der gruppe hanas"

    - name: Create Azure basic internal loadbalancer
      azure.azcollection.azure_rm_loadbalancer:
        resource_group: "{{ az_rg }}"
        name: "{{  az_rg + '_LB' }}"
        sku: "Basic"
        frontend_ip_configurations:
          - name: "{{  az_rg + '_LB_FE' }}"
            private_ip_allocation_method: "Dynamic"
            subnet: "{{ az_subnet }}"
        backend_address_pools:
          - name: "{{ az_rg + '_LB_BE }}"
        probes:
          - name: "{{  az_rg + '_probe' }}"
            port: 61000
            protocol: "Tcp"
      register: lb

    - name: Associate VMs with backend pool
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ az_rg }}"
        name: "{{ vm }}"
        virtual_network_name: myvnet
        subnet_name: mysubnet
        # enable_accelerated_networking: true
        ip_configurations:
          - name: myipconfig
            load_balancer_backend_address_pools:
              - id: "{{ lb.backend_address_pools[0].id }}"
      with_items:
        - "{{ vm1_name }}"
        - "{{ vm2_name }}"

    - name: Create Load Balancer Rules
      azure.azcollection.azure_rm_loadbalancer:
        resource_group: "{{ az_rg }}"
        name: "{{  az_rg + '_LB' }}"
        sku: "Basic"
        load_balancer_rules:
          - name: "{{ az_rg + '_LB_rule' }}"
            frontend_ip_configuration_name: "{{  az_rg + '_LB_FE' }}"
            backend_address_pool_name: "{{ az_rg + '_LB_BE }}"
            probe_name: "{{  az_rg + '_probe' }}"
            protocol: "Tcp"
            frontend_port: 30013
            backend_port: 30013
        ip_address: 10.0.0.5
        location: eastus
        priority: 1
        weight: 3
        ingress:
          - name: HTTP
            protocol: Tcp
            destination_port: 80
            action: Allow
            priority: 1
            direction: Inbound
            source: 192.0.2.0/24
          - name: HTTP
            protocol: Tcp
            destination_port: 81
            action: Allow
            priority: 1
            direction: Inbound
            source: 192.0.2.0/24
            frontend_port: 30013
            backend_port: 30013
    # Probe TCP/61000
    - name: Create Azure health probe
      azure.azcollection.azure_rm_loadbalancer:
        resource_group: "{{ resource_group }}"
        name: "{{ az_rg + '_LB' }}"
        probes:
          - name: "{{ az_rg + '_probe' }}"
        protocol: Tcp
        port: 61000
        interval_in_seconds: 5
        number_of_probes: 2
        health_check:
          - name: HTTP
            protocol: TCP
            target_port: 81
            action: Allow
            priority: 1
            direction: Inbound
            source: 192.0.2.0
          - name: Nodes
            protocol: TCP
            destination_port: 27
            action: Allow
            priority: 2
            direction: Inbound
            source: 192.0.2.0/24

    - name: Check severity
      azure.azcollection.azure_rm_monitorlogprofile:
        resource_group: "{{ resource_group }}"
        name: "{{ sb_name }}-severity-check"
        scopes:
          - "/subscriptions/{{ ansible_subscription_id }}/resourceGroups/{{ resource_group }}"
        description: "Activity log alert for severity check"
        enabled: true
        condition:
          all_of:
            - field: "category"
              equals: "Administrative"
            - field: "level"
              equals: "Error"
        actions:
          - action_group_id: "/subscriptions/{{ ansible_subscription_id }}/resourceGroups/{{ resource_group }}/providers/microsoft.insights/actionGroups/default"
        operation: GET_MODE

    - name: Get Controller info
      azure.azcollection.azure_rm_resource_info:
        provider:
          mode: console
      register: result

    - name: Assert result
      ansible.builtin.assert:
        that:
          - result is defined
        fail_msg: "Please logout:"

    - name: Create Azure loadbalancer rule
      azure.azcollection.azure_rm_loadbalancer:
        resource_group: "{{ resource_group }}"
        name: "{{ sb_name }}-lb"
        frontend_ip_configurations:
          - name: "{{ sb_name }}-frontend"
            public_ip_address: "{{ sb_name }}-pip"
        backend_address_pools:
          - name: "{{ sb_name }}-pool"
        load_balancing_rules:
          - name: azure-sso-allow-microsoft-ds
            frontend_ip_configuration: "{{ sb_name }}-frontend"
            backend_address_pool: "{{ sb_name }}-pool"
            protocol: TCP
            frontend_port: 30015
            backend_port: 30015
            enable_floating_ip: true
            idle_timeout_in_minutes: 30
        probes:
          - name: "{{ sb_name }}-probe"
            protocol: TCP
            port: 62503
            interval_in_seconds: 5
            number_of_probes: 2
      when: result.loadbalancer.id is defined

    - name: Add Loadbalancer pool to VM NIC
      azure.azcollection.azure_rm_networkinterface:
        name: "{{ item }}-nic"
        resource_group: "{{ resource_group }}"
        virtual_network: "{{ vnet_name }}"
        subnet: "{{ subnet_name }}"
        ip_configurations:
          - name: ipconfig1
            primary: true
            load_balancer_backend_address_pools:
              - "{{ result.loadbalancer.id }}/backendAddressPools/{{ sb_name }}-pool"
      loop: "{{ groups['hana_nodes'] }}"
      when: result.loadbalancer.id is defined

    - name: Configure HANA system replication
      ansible.builtin.include_role:
        name: community.sap_install.sap_ha_install_hana_hsr

    - name: Configure Pacemaker cluster
      ansible.builtin.include_role:
        name: community.sap_install.sap_ha_pacemaker_cluster
