<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kpatch Security Demo — Presenter</title>
<style>
  :root {
    --rh-red: #ee0000;
    --rh-dark: #151515;
    --rh-mid: #1a1a1a;
    --rh-panel: #212121;
    --rh-border: #333;
    --rh-text: #e8e8e8;
    --rh-muted: #888;
    --rh-green: #00c389;
    --rh-yellow: #f0ab00;
    --rh-blue: #06c;
    --mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--rh-dark);
    color: var(--rh-text);
    font-family: 'Red Hat Display', 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 56px 1fr 52px;
    grid-template-columns: 1fr;
  }

  /* ── Header ── */
  header {
    background: var(--rh-red);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    border-bottom: 2px solid #cc0000;
  }
  header .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; color: #fff; }
  header .title { font-size: 0.95rem; color: rgba(255,255,255,0.85); flex: 1; }
  header .step-indicator {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.2);
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* ── Main ── */
  main {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── Narration panel (left) ── */
  .narration {
    background: var(--rh-mid);
    border-right: 1px solid var(--rh-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .narration-label {
    padding: 10px 16px 6px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--rh-muted);
    border-bottom: 1px solid var(--rh-border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .narration-label .mic { color: var(--rh-red); }
  .narration-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .step-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .step-subtitle {
    font-size: 0.8rem;
    color: var(--rh-muted);
    margin-bottom: 20px;
    font-family: var(--mono);
  }
  .narration-text {
    font-size: 1.05rem;
    line-height: 1.7;
    color: #d8d8d8;
    border-left: 3px solid var(--rh-red);
    padding-left: 16px;
  }
  .narration-text p { margin-bottom: 14px; }
  .narration-text strong { color: #fff; }
  .cue {
    display: inline-block;
    background: var(--rh-red);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;
    vertical-align: middle;
  }
  .timing {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--rh-muted);
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid var(--rh-border);
  }

  /* ── Right panel ── */
  .right-panel {
    display: grid;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
  }

  /* ── Command panel ── */
  .commands {
    background: #0d0d0d;
    border-bottom: 1px solid var(--rh-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-label {
    padding: 8px 16px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--rh-muted);
    border-bottom: 1px solid var(--rh-border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rh-green);
  }
  .command-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cmd-block {
    background: #161616;
    border: 1px solid var(--rh-border);
    border-radius: 6px;
    overflow: hidden;
  }
  .cmd-label {
    padding: 6px 12px;
    font-size: 0.65rem;
    color: var(--rh-muted);
    background: #1c1c1c;
    border-bottom: 1px solid var(--rh-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cmd-label .aap-badge {
    font-size: 0.6rem;
    background: var(--rh-red);
    color: #fff;
    padding: 1px 6px;
    border-radius: 2px;
  }
  .cmd-label .cli-badge {
    font-size: 0.6rem;
    background: #333;
    color: #aaa;
    padding: 1px 6px;
    border-radius: 2px;
  }
  .cmd-text {
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: #a8d8a8;
    white-space: pre-wrap;
    word-break: break-all;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cmd-text:hover { background: #1a2a1a; }
  .cmd-text:active { background: #243024; }
  .copy-hint {
    font-size: 0.6rem;
    color: var(--rh-muted);
    padding: 4px 14px 6px;
    font-family: var(--mono);
  }

  /* ── Expected output panel ── */
  .expected {
    background: var(--rh-panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .expected-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }
  .output-block {
    display: none;
  }
  .output-block.active {
    display: block;
  }
  .output-before, .output-after {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .output-card {
    background: #0d0d0d;
    border-radius: 6px;
    border: 1px solid var(--rh-border);
    overflow: hidden;
  }
  .output-card-header {
    padding: 6px 12px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--rh-border);
  }
  .output-card-header.fail { color: #ff6b6b; background: rgba(238,0,0,0.08); }
  .output-card-header.pass { color: var(--rh-green); background: rgba(0,195,137,0.08); }
  .output-card-header.neutral { color: var(--rh-muted); background: #161616; }
  .output-card-body {
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 0.76rem;
    line-height: 1.6;
    white-space: pre;
  }
  .fail-text { color: #ff6b6b; }
  .pass-text { color: var(--rh-green); }
  .neutral-text { color: #ccc; }
  .warn-text { color: var(--rh-yellow); }

  /* ── Footer ── */
  footer {
    background: var(--rh-mid);
    border-top: 1px solid var(--rh-border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
  }
  .nav-btn {
    background: none;
    border: 1px solid var(--rh-border);
    color: var(--rh-text);
    padding: 6px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.82rem;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--rh-panel); border-color: #555; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--rh-red); border-color: var(--rh-red); color: #fff; }
  .nav-btn.primary:hover { background: #cc0000; }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--rh-border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--rh-red);
    transition: width 0.3s ease;
  }
  .key-hint {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--rh-muted);
  }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rh-border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Red Hat</div>
  <div class="title">kpatch Live Kernel Patching — Security Demo</div>
  <div class="step-indicator" id="step-counter">Step 1 of 5</div>
</header>

<main>
  <!-- ── Narration Panel ── -->
  <aside class="narration">
    <div class="narration-label">
      <span class="mic">●</span> NARRATION — READ THIS
    </div>
    <div class="narration-body" id="narration-body">
      <!-- Filled by JS -->
    </div>
  </aside>

  <!-- ── Right: Commands + Output ── -->
  <div class="right-panel">

    <div class="commands">
      <div class="panel-label">
        <span class="dot"></span>
        WHAT TO RUN
      </div>
      <div class="command-list" id="command-list">
        <!-- Filled by JS -->
      </div>
    </div>

    <div class="expected">
      <div class="panel-label">
        <span>EXPECTED OUTPUT / SCREEN STATE</span>
      </div>
      <div class="expected-body" id="expected-body">
        <!-- Filled by JS -->
      </div>
    </div>

  </div>
</main>

<footer>
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Prev</button>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <span class="key-hint">← → arrow keys</span>
  <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
</footer>

<script>
const steps = [

  // ─── STEP 0: SETUP ───────────────────────────────────────────────────────
  {
    title: "Scene 0: The Setup",
    subtitle: "pre-roll • ~20 seconds",
    narration: `
      <p>This RHEL 9 server is running kernel version <strong>5.14.0-570.39.1</strong>.</p>
      <p>Two published CVEs affect this kernel — CVE-2025-38052 and CVE-2025-38352.
      A compliance scan will confirm the exposure. We'll fix both without stopping this machine.</p>
      <p><span class="cue">show</span> Run the commands on the right. Let the terminal output settle before moving on.</p>
    `,
    timing: "Target: 20s",
    commands: [
      { label: "CLI — System state", badge: "cli", text: "uname -r && uptime && echo 'kernel and uptime ↑'" },
      { label: "CLI — kpatch status (should be empty)", badge: "cli", text: "kpatch list 2>/dev/null || echo 'kpatch not installed'" },
    ],
    output: `<div class="output-card">
      <div class="output-card-header neutral">Expected terminal output</div>
      <div class="output-card-body neutral-text">5.14.0-570.39.1.el9_6.x86_64
 09:14:22 up 2 days, 3:41,  1 user
kpatch not installed</div>
    </div>`
  },

  // ─── STEP 1: OSCAP BEFORE ────────────────────────────────────────────────
  {
    title: "Act 1: Compliance Scan",
    subtitle: "OpenSCAP OVAL • BEFORE kpatch • ~45 seconds",
    narration: `
      <p>Before we touch anything, we run an OpenSCAP compliance scan against the Red Hat
      OVAL definitions for this kernel's kpatch advisory.</p>
      <p>The scan checks one thing: is the <strong>kpatch-patch RPM</strong> installed?
      It's not — so the CVEs are exposed.</p>
      <p><span class="cue">AAP</span> Launch the job template. Watch it complete.
      The HTML report downloads automatically.</p>
      <p><span class="cue">show</span> Open the BEFORE report. The CVEs are <strong style="color:#ff6b6b">FAIL</strong>.</p>
    `,
    timing: "Target: 45s",
    commands: [
      { label: "AAP — Launch '07 - OpenSCAP Scan' with scan_label=before", badge: "aap",
        text: "ansible-playbook generic/07-oscap-scan.yml \\\n  -e target_group=hanas \\\n  -e scan_label=before" },
      { label: "CLI — Open the BEFORE report", badge: "cli",
        text: "xdg-open /tmp/oscap-demo/hana-sdmhr2-report-before.html" },
    ],
    output: `<div class="output-before">
      <div class="output-card">
        <div class="output-card-header fail">BEFORE — CVE status</div>
        <div class="output-card-body">
<span class="fail-text">FAIL  CVE-2025-38052
FAIL  CVE-2025-38352
FAIL  CVE-2026-31431</span>
<span class="neutral-text">
kpatch-patch-5_14_0-570_39_1
  not installed → vulnerable</span>
        </div>
      </div>
      <div class="output-card">
        <div class="output-card-header neutral">System state</div>
        <div class="output-card-body neutral-text">uname -r:
  5.14.0-570.39.1.el9_6.x86_64

kpatch list:
  (empty)

uptime: still running
no reboot yet</div>
      </div>
    </div>`
  },

  // ─── STEP 2: APPLY KPATCH ────────────────────────────────────────────────
  {
    title: "Act 2: Live Patch",
    subtitle: "kpatch apply • NO REBOOT • ~60 seconds",
    narration: `
      <p>Now we apply the live kernel patch. The <strong>kpatch service</strong> loads
      a kernel module that redirects the vulnerable code paths — in memory, in the
      running kernel, on a live system.</p>
      <p>No reboot. No change window. No downtime.</p>
      <p><span class="cue">AAP</span> Launch <em>05 - Apply Live Kernel Patches</em>.
      Watch the kpatch module load in the task output.</p>
      <p><span class="cue">show</span> While the job runs — show the uptime counter.
      The clock keeps running. The system never stops.</p>
    `,
    timing: "Target: 60s",
    commands: [
      { label: "AAP — Launch '05 - Apply Live Kernel Patches'", badge: "aap",
        text: "ansible-playbook generic/05-kpatch-livepatch.yml \\\n  -e target_group=hanas \\\n  -e kpatch_fail_if_none_loaded=true" },
      { label: "CLI — Watch uptime while kpatch runs (second terminal)", badge: "cli",
        text: "watch -n1 'uptime && kpatch list 2>/dev/null'" },
    ],
    output: `<div class="output-card">
      <div class="output-card-header neutral">Expected kpatch list output (after job)</div>
      <div class="output-card-body">
<span class="neutral-text">Loaded patch modules:</span>
<span class="pass-text">kpatch_5_14_0_570_39_1_1_1  [enabled]</span>
<span class="neutral-text">
uname -r:
  5.14.0-570.39.1.el9_6.x86_64
  (UNCHANGED — no reboot)

uptime: still counting up
  no reboot recorded</span>
      </div>
    </div>`
  },

  // ─── STEP 3: VERIFY ──────────────────────────────────────────────────────
  {
    title: "Act 3: Verify",
    subtitle: "kpatch list + HANA check • ~30 seconds",
    narration: `
      <p>The patch is live. Let's confirm the system state.</p>
      <p>Same kernel version. Uptime is continuous — the clock never reset.
      The kpatch module is loaded and enabled.</p>
      <p>If SAP HANA is installed: <strong>HDB info</strong> shows all processes
      still running. HANA never saw an interruption.</p>
      <p><span class="cue">show</span> Run the verify playbook.
      Every assert should be green.</p>
    `,
    timing: "Target: 30s",
    commands: [
      { label: "AAP — Launch '06 - Verify kpatch + HANA'", badge: "aap",
        text: "ansible-playbook generic/06-kpatch-verify.yml \\\n  -e target_group=hanas \\\n  -e sap_hana_sid=RHE" },
      { label: "CLI — Quick confirm", badge: "cli",
        text: "uname -r && kpatch list && uptime" },
    ],
    output: `<div class="output-card">
      <div class="output-card-header pass">Verify — all green</div>
      <div class="output-card-body">
<span class="pass-text">PASS: 1 kpatch module(s) loaded
PASS: hdbnameserver is running
PASS: hdbindexserver is running</span>
<span class="neutral-text">
════════════════════════════
  kpatch + HANA — PASSED
════════════════════════════
  Kernel:  5.14.0-570.39.1.el9_6.x86_64
  Patches: kpatch_5_14_0_570_39_1_1_1
  HANA:    hdbnameserver ✓
  Downtime: none
════════════════════════════</span>
      </div>
    </div>`
  },

  // ─── STEP 4: OSCAP AFTER ────────────────────────────────────────────────
  {
    title: "Act 4: The Proof",
    subtitle: "OpenSCAP OVAL • AFTER kpatch • ~45 seconds",
    narration: `
      <p>Now we run the same compliance scan again. Same OVAL content.
      Same scanner. Same host.</p>
      <p>The kpatch-patch RPM is now installed. The OVAL definition sees it.
      The CVEs are <strong style="color:#00c389">PASS</strong>.</p>
      <p>The kernel version is still 5.14.0-570.39.1. The uptime never reset.
      The compliance scanner says this system is no longer exposed.</p>
      <p><span class="cue">show</span> Put the BEFORE and AFTER reports side by side.
      Red on the left. Green on the right. Same system. No reboot.</p>
    `,
    timing: "Target: 45s — hold on the side-by-side",
    commands: [
      { label: "AAP — Launch '07 - OpenSCAP Scan' with scan_label=after", badge: "aap",
        text: "ansible-playbook generic/07-oscap-scan.yml \\\n  -e target_group=hanas \\\n  -e scan_label=after" },
      { label: "CLI — Open AFTER report (put beside BEFORE)", badge: "cli",
        text: "xdg-open /tmp/oscap-demo/hana-sdmhr2-report-after.html" },
    ],
    output: `<div class="output-before">
      <div class="output-card">
        <div class="output-card-header fail">BEFORE</div>
        <div class="output-card-body">
<span class="fail-text">FAIL  CVE-2025-38052
FAIL  CVE-2025-38352
FAIL  CVE-2026-31431</span>
        </div>
      </div>
      <div class="output-card">
        <div class="output-card-header pass">AFTER — same kernel, no reboot</div>
        <div class="output-card-body">
<span class="pass-text">PASS  CVE-2025-38052
PASS  CVE-2025-38352
PASS  CVE-2026-31431</span>
        </div>
      </div>
    </div>
    <div style="margin-top:10px">
    <div class="output-card">
      <div class="output-card-header neutral">State — unchanged throughout</div>
      <div class="output-card-body neutral-text">uname -r: 5.14.0-570.39.1.el9_6.x86_64  (same)
uptime:   4 days, 6:22                    (never reset)
kpatch:   1 module loaded                 (in-memory patch)
HANA:     running                         (never stopped)</div>
    </div></div>`
  },

];

// ─── State ───────────────────────────────────────────────────────────────────
let current = 0;

function render() {
  const s = steps[current];
  const total = steps.length;

  // Header
  document.getElementById('step-counter').textContent =
    `Step ${current + 1} of ${total}`;

  // Narration
  document.getElementById('narration-body').innerHTML = `
    <div class="step-title">${s.title}</div>
    <div class="step-subtitle">${s.subtitle}</div>
    <div class="narration-text">${s.narration}</div>
    <div class="timing">⏱ ${s.timing}</div>
  `;

  // Commands
  document.getElementById('command-list').innerHTML = s.commands.map(c => `
    <div class="cmd-block">
      <div class="cmd-label">
        <span>${c.label}</span>
        <span class="${c.badge === 'aap' ? 'aap-badge' : 'cli-badge'}">${c.badge.toUpperCase()}</span>
      </div>
      <div class="cmd-text" onclick="copyCmd(this)" title="Click to copy">${c.text}</div>
      <div class="copy-hint">click to copy</div>
    </div>
  `).join('');

  // Expected output
  document.getElementById('expected-body').innerHTML = s.output;

  // Progress
  document.getElementById('progress-fill').style.width =
    `${((current + 1) / total) * 100}%`;

  // Buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
  document.getElementById('btn-next').textContent =
    current === total - 1 ? 'Done ✓' : 'Next →';
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < steps.length) {
    current = next;
    render();
  }
}

function copyCmd(el) {
  navigator.clipboard.writeText(el.textContent.trim()).then(() => {
    const orig = el.style.background;
    el.style.background = '#1a3a1a';
    setTimeout(() => { el.style.background = orig; }, 300);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

render();
</script>
</body>
</html>
